site_name: Quant
site_dir: ../homepage
docs_dir: ../documents
use_directory_urls: false

repo_name: quant
repo_url: https://gitlab.com/zhrkevin-privates/quant.git

copyright: Copyright &copy; 2024 Jingzhi & Level

nav:
    - 主页: index.md
    - Quant 模型:
        - 数据说明: markdowns/quant-sse.md
        - 请求接口: markdowns/quant-request.md
    - 更新日志: changelog.md

theme:
    favicon: extra/favicon.ico
    features:
        - content.code.copy
        - navigation.expand
        - search.highlight
        - search.suggest
    font: false
    icon:
        admonition:
            info: material/book
            quote: material/comment-quote
        repo: material/gitlab
    language: zh
    logo: extra/logo.svg
    name: material

plugins:
    - autolinks:
    - search:
    - table-reader:

exclude_docs: |
    __init__.py
    run.py
    mkdocs.yml
    openapi/

extra:
    generator: false
    status:
      new: 最新更新

extra_css:
    - extra/blocks.css
    - extra/extra.css

validation:
    absolute_links: ignore

markdown_extensions:
    - abbr:
    - admonition:
    - attr_list:
    - pymdownx.details:
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - pymdownx.highlight:
        linenums_style: pymdownx-table
    - pymdownx.inlinehilite:
    - pymdownx.keys:
    - pymdownx.mark:
    - pymdownx.snippets:
        check_paths: true
    - pymdownx.superfences:
        preserve_tabs: true
    - pymdownx.tabbed:
        alternate_style: true
    - tables:
